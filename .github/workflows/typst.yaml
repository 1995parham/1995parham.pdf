---
name: typst
on:
  push:
    paths:
      - .github/workflows/typst.yaml
      - 'src/**/*.typ'
      - 'src/**/*.toml'
      - 'src/**/*.jpg'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: typst-community/setup-typst@v5
      # Ubuntu's apt has fonts-font-awesome v4 (we need v7) and no
      # fonts-xcharter at all, so download both directly. Both are OFL-licensed.
      - name: install fonts
        run: |
          mkdir -p ~/.local/share/fonts
          cd ~/.local/share/fonts
          curl -fsSL https://use.fontawesome.com/releases/v7.0.1/fontawesome-free-7.0.1-desktop.zip -o /tmp/fa.zip
          unzip -qoj /tmp/fa.zip 'fontawesome-free-*/otfs/*.otf' -d .
          curl -fsSL https://mirrors.ctan.org/fonts/xcharter.zip -o /tmp/xc.zip
          unzip -qoj /tmp/xc.zip 'xcharter/opentype/*.otf' -d .
          fc-cache -f
          fc-list | grep -iE "font.awesome|charter" | head
      - name: prepare build dir
        run: mkdir -p build
      - name: compile resume (default = turkey)
        run: typst compile src/cv.typ build/parham.pdf --input profile=turkey
      - name: compile resume (turkey)
        run: typst compile src/cv.typ build/parham-turkey.pdf --input profile=turkey
      - name: compile resume (iran)
        run: typst compile src/cv.typ build/parham-iran.pdf --input profile=iran
      - name: release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/parham.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
