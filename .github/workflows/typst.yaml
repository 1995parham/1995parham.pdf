---
name: typst
on:
  push:
    paths:
      - .github/workflows/typst.yaml
      - 'src/**/*.typ'
      - 'src/**/*.jpg'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: typst-community/setup-typst@v5
      - name: install xcharter font
        run: sudo apt-get update && sudo apt-get install -y fonts-xcharter
      - name: prepare build dir
        run: mkdir -p build
      - name: compile resume (default)
        run: typst compile src/main.typ build/parham.pdf
      - name: compile resume (turkey)
        run: typst compile src/turkey.typ build/parham-turkey.pdf
      - name: compile resume (iran)
        run: typst compile src/iran.typ build/parham-iran.pdf
      - name: release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/parham.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
