---
name: typst
on:
  # No `paths:` filter: tag pushes never trigger when `paths` is set, because
  # tagging a commit already on main doesn't carry a diff for the filter to
  # match. Build cost is trivial, so we trigger on every push to main and on
  # every tag push, then gate the release step on the tag ref.
  push:
    branches: [main]
    tags: ["*"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: typst-community/setup-typst@v5
      # The body font (XCharter) is vendored in-repo under fonts/ and passed to
      # typst via --font-path, so it needs no install here. Ubuntu's apt only has
      # fonts-font-awesome v4 (we need v7), so download FontAwesome directly.
      # Bump the cache key suffix to force a refresh after changing font versions.
      - name: cache fonts
        id: cache-fonts
        uses: actions/cache@v4
        with:
          path: ~/.local/share/fonts
          key: fonts-fa7.0.1-v2
      - name: download fonts
        if: steps.cache-fonts.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/fonts
          cd ~/.local/share/fonts
          curl -fsSL https://use.fontawesome.com/releases/v7.0.1/fontawesome-free-7.0.1-desktop.zip -o /tmp/fa.zip
          unzip -qoj /tmp/fa.zip 'fontawesome-free-*/otfs/*.otf' -d .
      - name: refresh font cache
        run: |
          fc-cache -f
          fc-list | grep -iE "font.awesome" | head
      - name: prepare build dir
        run: mkdir -p build
      - name: compile resume (turkey)
        run: typst compile src/cv.typ build/parham-turkey.pdf --input profile=turkey --font-path fonts
      - name: compile resume (iran)
        run: typst compile src/cv.typ build/parham-iran.pdf --input profile=iran --font-path fonts
      - name: release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            build/parham-turkey.pdf
            build/parham-iran.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
